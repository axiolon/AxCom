components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Standard envelopes
    ErrorResponseEnvelope:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: Something went wrong.

    MessageResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            message:
              type: string
              example: Operation completed successfully.

    # Auth schemas
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
        created_at:
          type: string
          format: date-time

    Session:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time

    RegisterResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/User'

    SessionResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Session'

    PasswordResetRequestResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            message:
              type: string
            reset_token:
              type: string
            expires_at:
              type: string
              format: date-time

    # Product schemas
    Variant:
      type: object
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        price:
          type: number
        attributes:
          type: object
          additionalProperties:
            type: string

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category_id:
          type: string
        variants:
          type: array
          items:
            $ref: '#/components/schemas/Variant'

    ProductResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Product'

    ProductListResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'

    CreateProductRequest:
      type: object
      required:
        - name
        - category_id
        - variants
      properties:
        name:
          type: string
        description:
          type: string
        category_id:
          type: string
        variants:
          type: array
          items:
            type: object
            required:
              - sku
              - name
              - price
            properties:
              id:
                type: string
              sku:
                type: string
              name:
                type: string
              price:
                type: number
              attributes:
                type: object
                additionalProperties:
                  type: string

    # Category schemas
    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        parent_id:
          type: string
          nullable: true

    CategoryResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Category'

    CategoryListResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    # Review schemas
    Review:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
        user_id:
          type: string
        rating:
          type: integer
        comment:
          type: string
        created_at:
          type: string
          format: date-time

    ReviewResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Review'

    ReviewListResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Review'

    RatingSummaryResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            product_id:
              type: string
            average_rating:
              type: number
            review_count:
              type: integer

    # Cart schemas
    CartItem:
      type: object
      properties:
        variant_id:
          type: string
        quantity:
          type: integer
        price:
          type: number

    Cart:
      type: object
      properties:
        customer_id:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'

    CartResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Cart'

    # Order schemas
    OrderItemRequest:
      type: object
      required:
        - variant_id
        - quantity
        - price
      properties:
        variant_id:
          type: string
        quantity:
          type: integer
        price:
          type: number

    OrderItem:
      type: object
      properties:
        variant_id:
          type: string
        quantity:
          type: integer
        price:
          type: number

    UserOrder:
      type: object
      properties:
        id:
          type: string
        total:
          type: number
        status:
          type: string
        created_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    UserOrderResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/UserOrder'

    UserOrderListResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            orders:
              type: array
              items:
                $ref: '#/components/schemas/UserOrder'
            count:
              type: integer

    GuestInfo:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        contact_number:
          type: string

    GuestOrder:
      type: object
      properties:
        order_id:
          type: string
        status:
          type: string
        total:
          type: number
        created_at:
          type: string
          format: date-time
        guest_info:
          $ref: '#/components/schemas/GuestInfo'

    GuestOrderResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/GuestOrder'

    # Admin Order schemas
    AdminOrder:
      type: object
      properties:
        id:
          type: string
        customer_id:
          type: string
        guest_info:
          $ref: '#/components/schemas/GuestInfo'
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        total:
          type: number
        status:
          type: string
        created_at:
          type: string
          format: date-time

    AdminOrderResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/AdminOrder'

    AdminOrderListResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            orders:
              type: array
              items:
                $ref: '#/components/schemas/AdminOrder'
            count:
              type: integer

    # Inventory schemas
    StockItem:
      type: object
      properties:
        variant_id:
          type: string
        location_id:
          type: string
        quantity:
          type: integer
        low_stock_threshold:
          type: integer
        allow_backorders:
          type: boolean
        backorder_limit:
          type: integer
        is_low_stock:
          type: boolean

    StockListResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/StockItem'

    StockCheckResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            variant_id:
              type: string
            location_id:
              type: string
            quantity:
              type: integer

    Alert:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        message:
          type: string
        variant_id:
          type: string
        created_at:
          type: string
          format: date-time
        is_read:
          type: boolean

    AlertListResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            alerts:
              type: array
              items:
                $ref: '#/components/schemas/Alert'

    # Admin dashboard stats
    AdminDashboardResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            total_sales:
              type: number
            pending_orders:
              type: integer
            low_stock_skus:
              type: array
              items:
                type: string
            active_users:
              type: integer

    # Notification schemas
    Notification:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        type:
          type: string
        message:
          type: string
        sent_at:
          type: string
          format: date-time
        status:
          type: string

    NotificationResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Notification'
