# MongoDB deployment
# Prerequisite: docker network create ecom-net
# Standalone: docker compose up
# Full mode:  change ./config.yaml to ./config.full.yaml in app volumes

version: "3.8"

services:
  app:
    build:
      context: ../../
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - ../../.env.${APP_ENV:-dev}
    environment:
      - DB_CONNECTION_STRING=mongodb://db:27017/ecom_db?replicaSet=rs0&directConnection=true
      - APP_CONFIG=/app/config.yaml
      - LOG_FORMAT=json
      - LOG_LEVEL=info
      - OTEL_ENABLED=true
      - OTEL_EXPORTER=otlp
      - OTEL_TRACE_SAMPLE=1.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otelcol:4318
      - SKIP_RATE_LIMIT=true
    volumes:
      - ./config.full.yaml:/app/config.yaml:ro
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - ecom-net
      - default

  db:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

  db-init:
    image: mongo:latest
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      - mongosh
      - --host
      - db:27017
      - --eval
      - |
        try {
          rs.status();
          console.log("Replica set already initialized.");
        } catch (err) {
          console.log("Initializing replica set...");
          rs.initiate({
            _id: "rs0",
            members: [
              { _id: 0, host: "db:27017" }
            ]
          });
        }

volumes:
  mongo-data:

networks:
  ecom-net:
    external: true
