apiVersion: 1

providers:
  - name: ecom-engine
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    # allowUiUpdates: false in production to prevent dashboard drift.
    # Set true locally if you need to iterate in the UI then export.
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      # Subdirectory names become Grafana folder names automatically.
      foldersFromFilesStructure: true
