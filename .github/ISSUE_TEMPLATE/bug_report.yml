name: 🐛 Bug Report
description: Report a bug or unexpected behavior in AxCom.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please check existing issues first to avoid duplicates.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the problem...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: |
        How can we reproduce this bug? Please provide a minimal example or list the steps.
      placeholder: |
        1. Run server with env variable X
        2. Call POST /api/auth/register with body...
        3. See error response...
    validations:
      required: true
  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs Actual Behavior
      description: What did you expect to happen, and what actually happened?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Please share your Go version, MongoDB version, Redis version, and Operating System.
      placeholder: |
        - Go Version: 1.25.0
        - MongoDB Version: 6.0
        - Redis Version: 7.0
        - OS: Windows 11 / Linux Ubuntu 22.04
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Messages
      description: Paste any error messages, terminal output, or Go stack traces here.
      render: shell
  - type: checkboxes
    id: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have searched the existing issues to ensure this is not a duplicate.
          required: true
        - label: I have read the [Contributing Guidelines](https://github.com/axiolon-labs/ecom-engine/blob/main/CONTRIBUTING.md).
          required: true
