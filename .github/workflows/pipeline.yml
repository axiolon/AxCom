name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  # =========================================================================
  # CI Jobs (Runs on Pull Requests and Pushes to main)
  # =========================================================================

  license-compliance:
    name: License Header Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true

      - name: Run addlicense check
        run: |
          go run github.com/google/addlicense@v1.1.1 \
            -check \
            -c "Axiolon Labs" \
            -l apache \
            -s=only \
            -ignore "**/node_modules/**" \
            -ignore "**/dist/**" \
            -ignore "**/.next/**" \
            -ignore "**/.git/**" \
            -ignore "**/vendor/**" \
            -ignore "**/.idea/**" \
            -ignore "**/.vscode/**" \
            -ignore "**/*.json" \
            -ignore "**/*.md" \
            -ignore "**/LICENSE" \
            -ignore "**/NOTICE" \
            -ignore "**/Dockerfile" \
            .

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: axcom-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: axcom-backend
          args: --max-issues-per-linter=0 --max-same-issues=0

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: axcom-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          work-dir: axcom-backend

      - name: Run gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest && gosec ./...

  test:
    name: Unit & Race Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: axcom-backend
    services:
      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true

      - name: Run Tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  e2e:
    name: E2E Tests (MongoDB + real API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: axcom-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true

      - name: Run E2E Tests
        run: go test -tags e2e -v -timeout 300s ./tests/e2e/...

  # =========================================================================
  # CD Jobs (Runs ONLY on Push/Merge to main, AFTER CI jobs succeed)
  # =========================================================================

  build-binaries:
    name: Build & Package Binaries
    runs-on: ubuntu-latest
    needs: [lint, security, test, e2e, license-compliance]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: axcom-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true

      - name: Build for Linux (amd64)
        run: env GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/ecom-engine-linux-amd64 ./cmd/server/main.go

      - name: Build for macOS (amd64)
        run: env GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/ecom-engine-darwin-amd64 ./cmd/server/main.go

      - name: Build for Windows (amd64)
        run: env GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/ecom-engine-windows-amd64.exe ./cmd/server/main.go

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: ecom-engine-binaries
          path: dist/*
          retention-days: 14

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, security, test, e2e, license-compliance]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: axcom-backend
          file: axcom-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
